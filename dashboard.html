<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard - HostelMart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="flex">
        <!-- Sidebar -->
        <div class="w-64 bg-white shadow-lg h-screen">
            <div class="p-6">
                <h2 class="text-2xl font-bold text-gray-800 mb-6">Seller Dashboard</h2>
                
                <nav class="space-y-2">
                    <a href="#" onclick="showDashboardStats()" 
                       class="flex items-center space-x-3 text-gray-700 p-3 rounded-lg hover:bg-green-50 hover:text-green-600 transition-colors">
                        <i class="fas fa-chart-line"></i>
                        <span>Dashboard</span>
                    </a>
                    
                    <a href="#" onclick="showAddProductForm()" 
                       class="flex items-center space-x-3 text-gray-700 p-3 rounded-lg hover:bg-green-50 hover:text-green-600 transition-colors">
                        <i class="fas fa-plus-circle"></i>
                        <span>Add Products</span>
                    </a>
                    
                    <a href="index.html" 
                       class="flex items-center space-x-3 text-gray-700 p-3 rounded-lg hover:bg-green-50 hover:text-green-600 transition-colors">
                        <i class="fas fa-home"></i>
                        <span>Home</span>
                    </a>
                </nav>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="flex-1 p-8">
            <div id="dashboardContent">
                <!-- Dashboard content will be loaded here -->
                <div class="text-center">
                    <i class="fas fa-spinner fa-spin text-4xl text-gray-400 mb-4"></i>
                    <p class="text-gray-600">Loading dashboard...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize dashboard
        document.addEventListener('DOMContentLoaded', function() {
            showDashboardStats();
        });
        
        // Dashboard Functions
        function showDashboardStats() {
            const content = document.getElementById('dashboardContent');
            
            // Get data from localStorage
            const products = JSON.parse(localStorage.getItem('sellerProducts') || '[]');
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            
            // Calculate statistics
            const totalProducts = products.length;
            const totalRevenue = orders.reduce((sum, order) => sum + order.total, 0);
            const totalItemsSold = orders.reduce((sum, order) => sum + order.items.length, 0);
            
            content.innerHTML = `
                <h1 class="text-3xl font-bold text-gray-800 mb-8">Dashboard</h1>
                
                <!-- Stats Cards -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="bg-white border border-gray-200 rounded-lg p-6">
                        <div class="flex items-center">
                            <div class="flex-1">
                                <p class="text-sm font-medium text-gray-600">Total Products</p>
                                <p class="text-3xl font-bold text-blue-800">${totalProducts}</p>
                            </div>
                            <svg class="w-12 h-12 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4M20 7l-8 4 8 4"></path>
                            </svg>
                        </div>
                    </div>
                    
                    <div class="bg-white border border-gray-200 rounded-lg p-6">
                        <div class="flex items-center">
                            <div class="flex-1">
                                <p class="text-sm font-medium text-gray-600">Total Revenue</p>
                                <p class="text-3xl font-bold text-green-800">₹${totalRevenue}</p>
                            </div>
                            <svg class="w-12 h-12 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3-1.343-3-3 0-1.657 1.343-3 3 1.657 0 3 1.343 3 3 0 1.657-1.343 3-3zm0 11.667v-11.667h-2v11.667h2z"></path>
                            </svg>
                        </div>
                    </div>
                    
                    <div class="bg-white border border-gray-200 rounded-lg p-6">
                        <div class="flex items-center">
                            <div class="flex-1">
                                <p class="text-sm font-medium text-gray-600">Total Items Sold</p>
                                <p class="text-3xl font-bold text-purple-800">${totalItemsSold}</p>
                            </div>
                            <svg class="w-12 h-12 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4"></path>
                            </svg>
                        </div>
                    </div>
                </div>
                
                <!-- Recent Orders -->
                <div class="bg-white border border-gray-200 rounded-lg p-6">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-lg font-semibold text-gray-800">Recent Orders</h3>
                        <button onclick="markAllOrdersDelivered()" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 transition-colors text-sm">
                            Mark All Delivered
                        </button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead>
                                <tr class="border-b border-gray-200">
                                    <th class="text-left py-2 px-4">Order ID</th>
                                    <th class="text-left py-2 px-4">Date</th>
                                    <th class="text-left py-2 px-4">Items</th>
                                    <th class="text-left py-2 px-4">Total</th>
                                    <th class="text-left py-2 px-4">Status</th>
                                    <th class="text-left py-2 px-4">Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${orders.slice(-5).reverse().map(order => `
                                    <tr class="border-b border-gray-100 hover:bg-gray-50">
                                        <td class="py-2 px-4">#${order.id}</td>
                                        <td class="py-2 px-4">${new Date(order.date).toLocaleDateString()}</td>
                                        <td class="py-2 px-4">${order.items.length} items</td>
                                        <td class="py-2 px-4 font-medium">₹${order.total}</td>
                                        <td class="py-2 px-4">
                                            <span class="px-2 py-1 text-xs rounded-full ${
                                                order.status === 'pending' ? 'bg-yellow-100 text-yellow-800' :
                                                order.status === 'delivered' ? 'bg-green-100 text-green-800' :
                                                'bg-gray-100 text-gray-800'
                                            }">
                                                ${order.status || 'pending'}
                                            </span>
                                        </td>
                                        <td class="py-2 px-4">
                                            ${order.status === 'pending' ? `
                                                <button onclick="updateOrderStatus(${order.id}, 'delivered')" class="bg-green-500 text-white px-3 py-1 rounded text-xs hover:bg-green-600 transition-colors">
                                                    Mark Delivered
                                                </button>
                                            ` : order.status === 'delivered' ? `
                                                <button onclick="updateOrderStatus(${order.id}, 'pending')" class="bg-gray-500 text-white px-3 py-1 rounded text-xs hover:bg-gray-600 transition-colors">
                                                    Mark Pending
                                                </button>
                                            ` : ''}
                                        </td>
                                    </tr>
                                `).join('')}
                                ${orders.length === 0 ? '<tr><td colspan="6" class="py-4 text-center text-gray-500">No orders yet</td></tr>' : ''}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }
        
        function showAddProductForm() {
            const content = document.getElementById('dashboardContent');
            
            content.innerHTML = `
                <h1 class="text-3xl font-bold text-gray-800 mb-8">Add Product</h1>
                
                <div class="bg-white border border-gray-200 rounded-lg p-6 max-w-2xl mx-auto">
                    <form id="addProductForm" class="space-y-6">
                        <div class="mb-6">
                            <label for="productName" class="block text-sm font-medium text-gray-700 mb-2">Product Name</label>
                            <input type="text" id="productName" required
                                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
                                   placeholder="Enter product name">
                        </div>
                        
                        <div class="mb-6">
                            <label for="productDescription" class="block text-sm font-medium text-gray-700 mb-2">Description</label>
                            <textarea id="productDescription" required rows="3"
                                      class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
                                      placeholder="Enter product description"></textarea>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                            <div>
                                <label for="productLocation" class="block text-sm font-medium text-gray-700 mb-2">Select Hostel</label>
                                <select id="productLocation" required
                                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent">
                                    <option value="">Select Hostel</option>
                                    <option value="archimedes">Archimedes</option>
                                    <option value="franklin">Franklin</option>
                                    <option value="aristotle">Aristotle</option>
                                    <option value="marcopolo">Marcopolo</option>
                                    <option value="magellan">Magellan</option>
                                </select>
                            </div>
                            
                            <div>
                                <label for="productCategory" class="block text-sm font-medium text-gray-700 mb-2">Category</label>
                                <select id="productCategory" required
                                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent">
                                    <option value="">Select Category</option>
                                    <option value="grocery">Grocery</option>
                                    <option value="snacks">Snacks</option>
                                    <option value="beverages">Beverages</option>
                                    <option value="personal_care">Personal Care</option>
                                    <option value="electronics">Electronics</option>
                                    <option value="stationery">Stationery</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                            <div>
                                <label for="productPrice" class="block text-sm font-medium text-gray-700 mb-2">Price (₹)</label>
                                <input type="number" id="productPrice" required min="1" step="0.01"
                                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
                                       placeholder="Enter price">
                            </div>
                            
                            <div>
                                <label for="productImage" class="block text-sm font-medium text-gray-700 mb-2">Image URL</label>
                                <input type="url" id="productImage" required
                                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
                                       placeholder="https://example.com/image.jpg">
                            </div>
                        </div>
                        
                        <button type="submit" 
                                class="w-full bg-green-600 text-white py-3 rounded-lg hover:bg-green-700 transition-colors duration-200 font-semibold">
                            Add Product
                        </button>
                    </form>
                </div>
            `;
            
            // Add form submit handler
            document.getElementById('addProductForm').addEventListener('submit', handleAddProduct);
        }
        
        function handleAddProduct(event) {
            event.preventDefault();
            
            const newProduct = {
                id: Date.now(), // Use timestamp for unique ID
                name: document.getElementById('productName').value,
                description: document.getElementById('productDescription').value,
                price: parseFloat(document.getElementById('productPrice').value),
                image: document.getElementById('productImage').value,
                location: document.getElementById('productLocation').value,
                category: document.getElementById('productCategory').value
            };
            
            // Store in localStorage
            const sellerProducts = JSON.parse(localStorage.getItem('sellerProducts') || '[]');
            sellerProducts.push(newProduct);
            localStorage.setItem('sellerProducts', JSON.stringify(sellerProducts));
            
            alert(`Product "${newProduct.name}" added successfully to ${newProduct.location}!`);
            
            // Show dashboard again
            showDashboardStats();
        }
        
        function updateOrderStatus(orderId, newStatus) {
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            const orderIndex = orders.findIndex(order => order.id === orderId);
            
            if (orderIndex !== -1) {
                orders[orderIndex].status = newStatus;
                localStorage.setItem('orders', JSON.stringify(orders));
                
                let statusText = '';
                if (newStatus === 'delivered') {
                    statusText = 'marked as delivered';
                } else if (newStatus === 'pending') {
                    statusText = 'marked as pending';
                }
                
                alert(`Order #${orderId} ${statusText}!`);
                
                // Refresh dashboard
                showDashboardStats();
            }
        }
        
        function markAllOrdersDelivered() {
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            let updatedCount = 0;
            
            orders.forEach(order => {
                if (order.status === 'pending') {
                    order.status = 'delivered';
                    updatedCount++;
                }
            });
            
            if (updatedCount > 0) {
                localStorage.setItem('orders', JSON.stringify(orders));
                alert(`${updatedCount} orders marked as delivered!`);
                showDashboardStats();
            } else {
                alert('No pending orders to mark as delivered!');
            }
        }
    </script>
</body>
</html>
