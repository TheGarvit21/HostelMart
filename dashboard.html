<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard - HostelMart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="assets/js/config.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/cart.js"></script>
    <script src="assets/js/seller.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!Auth.isSeller()) {
                window.location.href = 'index.html';
                return;
            }
            Seller.showDashboard();
        });
    </script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="flex">
        <!-- Sidebar -->
        <div class="w-64 bg-white shadow-lg h-screen">
            <div class="p-6">
                <h2 class="text-2xl font-bold text-gray-800 mb-6">Seller Dashboard</h2>
                
                <nav class="space-y-2">
                    <button onclick="Seller.showDashboard()" id="dashboardBtn"
                       class="w-full text-left flex items-center space-x-3 text-gray-700 p-3 rounded-lg hover:bg-green-50 hover:text-green-600 transition-colors">
                        <i class="fas fa-chart-line"></i>
                        <span>Dashboard</span>
                    </button>
                    
                    <button onclick="Seller.showAddProductForm()" id="addProductBtn"
                       class="w-full text-left flex items-center space-x-3 text-gray-700 p-3 rounded-lg hover:bg-green-50 hover:text-green-600 transition-colors">
                        <i class="fas fa-plus-circle"></i>
                        <span>Add Products</span>
                    </button>
                    
                    <a href="index.html" 
                       class="flex items-center space-x-3 text-gray-700 p-3 rounded-lg hover:bg-green-50 hover:text-green-600 transition-colors">
                        <i class="fas fa-home"></i>
                        <span>Home</span>
                    </a>
                </nav>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="flex-1 p-8">
            <div id="sellerContent">
                <!-- Content will be loaded by Seller.showDashboard() -->
                <div class="text-center">
                    <i class="fas fa-spinner fa-spin text-4xl text-gray-400 mb-4"></i>
                    <p class="text-gray-600">Loading...</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
</body>
</html>
