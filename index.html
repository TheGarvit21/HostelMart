<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HostelMart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="products.js"></script>
    <style>
        /* Custom styles for green and white combination */
        .logo-orange {
            background-color: #FB923C;
        }
        .logo-green {
            color: #10B981;
        }
        .cart-green {
            background-color: #10B981;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navbar -->
    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Logo -->
                <div class="flex items-center">
                    <div class="flex items-center space-x-2">
                        <div class="w-8 h-8 logo-orange rounded-lg flex items-center justify-center">
                            <div class="w-5 h-5 bg-white rounded-sm"></div>
                        </div>
                        <div class="flex flex-col leading-none">
                            <span class="text-xl font-bold logo-green">Hostel</span>
                            <span class="text-xl font-bold logo-green">Mart</span>
                        </div>
                    </div>
                </div>

                
                <!-- Search Bar -->
                <div class="flex-1 max-w-lg mx-8">
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                            </svg>
                        </div>
                        <input
                            type="text"
                            class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg bg-gray-50 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
                            placeholder="Search for 'Cakes'"
                        />
                    </div>
                </div>

                <!-- Right Side Buttons -->
                <div class="flex items-center space-x-4">
                    <!-- Login Button -->
                    <button onclick="openLoginModal()" class="flex items-center space-x-2 px-4 py-2 text-sm font-medium text-gray-700 hover:text-green-600 focus:outline-none">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                        <span>Login</span>
                    </button>

                    <!-- My Cart Button -->
                    <button onclick="openCartModal()" class="flex items-center space-x-2 px-4 py-2 cart-green text-white rounded-lg hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-green-500">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path>
                        </svg>
                        <span>My Cart</span>
                        <span id="cartCount" class="bg-red-500 text-white text-xs rounded-full px-2 py-1 ml-2 hidden">0</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Login Modal -->
    <div id="loginModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-8 max-w-md w-full mx-4">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-gray-800">Login</h2>
                <button onclick="closeLoginModal()" class="text-gray-500 hover:text-gray-700">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            
            <!-- Tab Buttons -->
            <div class="flex mb-6 border-b border-gray-200">
                <button onclick="showLoginForm()" id="loginTab" class="flex-1 py-2 text-center font-medium text-green-600 border-b-2 border-green-600">
                    Existing User
                </button>
                <button onclick="showSignUpForm()" id="signupTab" class="flex-1 py-2 text-center font-medium text-gray-600 hover:text-green-600">
                    New User
                </button>
            </div>
            
            <!-- Login Form -->
            <div id="loginForm">
                <form onsubmit="handleLogin(event)">
                    <div class="mb-4">
                        <label for="loginEmail" class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                        <input type="email" id="loginEmail" name="email" required
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
                               placeholder="Enter your email">
                    </div>
                    
                    <div class="mb-6">
                        <label for="loginPassword" class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                        <input type="password" id="loginPassword" name="password" required
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
                               placeholder="Enter your password">
                    </div>
                    
                    <button type="submit" class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition-colors duration-200">
                        Login
                    </button>
                </form>
            </div>
            
            <!-- Sign Up Form -->
            <div id="signupForm" class="hidden">
                <form onsubmit="handleSignUp(event)">
                    <div class="mb-4">
                        <label for="signupName" class="block text-sm font-medium text-gray-700 mb-2">Full Name</label>
                        <input type="text" id="signupName" name="name" required
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
                               placeholder="Enter your full name">
                    </div>
                    
                    <div class="mb-4">
                        <label for="signupEmail" class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                        <input type="email" id="signupEmail" name="email" required
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
                               placeholder="Enter your email">
                    </div>
                    
                    <div class="mb-4">
                        <label for="signupPassword" class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                        <input type="password" id="signupPassword" name="password" required
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
                               placeholder="Create a password">
                    </div>
                    
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Category</label>
                        <div class="flex space-x-4">
                            <label class="flex items-center">
                                <input type="radio" name="category" value="user" checked required
                                       class="mr-2 text-green-600 focus:ring-green-500">
                                <span class="text-gray-700">User</span>
                            </label>
                            <label class="flex items-center">
                                <input type="radio" name="category" value="seller" required
                                       class="mr-2 text-green-600 focus:ring-green-500">
                                <span class="text-gray-700">Seller</span>
                            </label>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label for="signupMobile" class="block text-sm font-medium text-gray-700 mb-2">Mobile Number</label>
                        <input type="tel" id="signupMobile" name="mobile" required
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
                               placeholder="Enter your mobile number">
                    </div>
                    
                    <div class="mb-6">
                        <label for="signupRoom" class="block text-sm font-medium text-gray-700 mb-2">Room Number</label>
                        <input type="text" id="signupRoom" name="room" required
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
                               placeholder="Enter your room number">
                    </div>
                    
                    <button type="submit" class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition-colors duration-200">
                        Sign Up
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-8 max-w-md w-full mx-4">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-gray-800">Settings</h2>
                <button onclick="closeSettingsModal()" class="text-gray-500 hover:text-gray-700">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            
            <form id="settingsForm" onsubmit="handleSettingsUpdate(event)">
                <div class="mb-4">
                    <label for="settingsName" class="block text-sm font-medium text-gray-700 mb-2">Full Name</label>
                    <input type="text" id="settingsName" name="name" required
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent">
                </div>
                
                <div class="mb-4">
                    <label for="settingsEmail" class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                    <input type="email" id="settingsEmail" name="email" required
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent">
                </div>
                
                <div class="mb-4">
                    <label for="settingsMobile" class="block text-sm font-medium text-gray-700 mb-2">Mobile Number</label>
                    <input type="tel" id="settingsMobile" name="mobile" required
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent">
                </div>
                
                <div class="mb-4">
                    <label for="settingsRoom" class="block text-sm font-medium text-gray-700 mb-2">Room Number</label>
                    <input type="text" id="settingsRoom" name="room" required
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent">
                </div>
                
                <div class="mb-6">
                    <label for="settingsCurrentPassword" class="block text-sm font-medium text-gray-700 mb-2">Current Password</label>
                    <input type="password" id="settingsCurrentPassword" name="currentPassword" required
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
                           placeholder="Enter current password">
                </div>
                
                <div class="mb-6">
                    <label for="settingsNewPassword" class="block text-sm font-medium text-gray-700 mb-2">New Password (leave blank to keep current)</label>
                    <input type="password" id="settingsNewPassword" name="newPassword"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
                           placeholder="Enter new password">
                </div>
                
                <button type="submit" class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition-colors duration-200">
                    Update Settings
                </button>
            </form>
        </div>
    </div>

    <!-- Cart Modal -->
    <div id="cartModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-8 max-w-4xl w-full mx-4 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-gray-800">My Cart</h2>
                <button onclick="closeCartModal()" class="text-gray-500 hover:text-gray-700">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Cart Items -->
                <div class="lg:col-span-2">
                    <div id="cartItems" class="space-y-4">
                        <!-- Cart items will be loaded here -->
                    </div>
                </div>
                
                <!-- Order Summary & Payment -->
                <div class="lg:col-span-1">
                    <div class="bg-gray-50 rounded-lg p-6">
                        <h3 class="text-lg font-semibold text-gray-800 mb-4">Order Summary</h3>
                        
                        <div class="space-y-2 mb-4">
                            <div class="flex justify-between">
                                <span class="text-gray-600">Subtotal:</span>
                                <span id="subtotal" class="font-medium">₹0</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-gray-600">Delivery Fee:</span>
                                <span class="font-medium">₹20</span>
                            </div>
                            <div class="flex justify-between text-lg font-bold">
                                <span>Total:</span>
                                <span id="total" class="text-green-600">₹0</span>
                            </div>
                        </div>
                        
                        <div class="mb-6">
                            <h4 class="font-semibold text-gray-800 mb-3">Delivery Details</h4>
                            <div class="space-y-2">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Room Number</label>
                                    <input type="text" id="deliveryRoom" required
                                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
                                           placeholder="Enter room number">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Mobile Number</label>
                                    <input type="tel" id="deliveryMobile" required
                                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
                                           placeholder="Enter mobile number">
                                </div>
                            </div>
                        </div>
                        
                        <div class="mb-6">
                            <h4 class="font-semibold text-gray-800 mb-3">Payment Method</h4>
                            <div class="space-y-2">
                                <label class="flex items-center">
                                    <input type="radio" name="payment" value="cash" checked required
                                           class="mr-2 text-green-600 focus:ring-green-500">
                                    <span class="text-gray-700">Cash on Delivery</span>
                                </label>
                                <label class="flex items-center">
                                    <input type="radio" name="payment" value="online" required
                                           class="mr-2 text-green-600 focus:ring-green-500">
                                    <span class="text-gray-700">Online Payment</span>
                                </label>
                            </div>
                        </div>
                        
                        <button onclick="placeOrder()" class="w-full bg-green-600 text-white py-3 rounded-lg hover:bg-green-700 transition-colors duration-200 font-semibold">
                            Place Order
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8">
        
        <!-- Product Grid -->
        <div id="productGrid" class="mt-8 grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <!-- Products will be loaded dynamically here -->
        </div>
    </main>

    <script>
        function toggleLocation() {
            const dropdown = document.getElementById('locationDropdown');
            dropdown.classList.toggle('hidden');
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', function(event) {
            const dropdown = document.getElementById('locationDropdown');
            const button = event.target.closest('button');
            
            if (!button || !button.onclick || button.onclick.toString().indexOf('toggleLocation') === -1) {
                dropdown.classList.add('hidden');
            }
        });

        // Load products dynamically
        function loadProducts() {
            const productGrid = document.getElementById('productGrid');
            
            products.forEach(product => {
                const productCard = document.createElement('div');
                productCard.className = 'bg-white rounded-lg shadow-md p-4 hover:shadow-lg transition-shadow duration-300';
                productCard.innerHTML = `
                    <div class="w-full h-40 overflow-hidden rounded-lg mb-4">
                        <img src="${product.image}" alt="${product.name}" class="w-full h-full object-cover hover:scale-105 transition-transform duration-300">
                    </div>
                    <h3 class="font-semibold text-gray-800">${product.name}</h3>
                    <p class="text-gray-600 text-sm">${product.description}</p>
                    <p class="mt-2 text-lg font-bold text-green-600">₹${product.price}</p>
                    <button onclick="addToCart(${product.id})" class="mt-2 w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition-colors duration-200">
                        Add to Cart
                    </button>
                `;
                productGrid.appendChild(productCard);
            });
        }

        // Cart Functions
        let cart = JSON.parse(localStorage.getItem('cart') || '[]');

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            if (product) {
                // Check if product already in cart
                const existingItem = cart.find(item => item.id === productId);
                if (existingItem) {
                    existingItem.quantity += 1;
                    alert(`${product.name} quantity updated to ${existingItem.quantity}!`);
                } else {
                    cart.push({
                        id: product.id,
                        name: product.name,
                        price: product.price,
                        image: product.image,
                        quantity: 1
                    });
                    alert(`${product.name} added to cart!`);
                }
                
                localStorage.setItem('cart', JSON.stringify(cart));
                updateCartCount();
                updateCartDisplay();
            }
        }

        function updateCartCount() {
            const cartCount = document.getElementById('cartCount');
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            
            if (totalItems > 0) {
                cartCount.textContent = totalItems;
                cartCount.classList.remove('hidden');
            } else {
                cartCount.classList.add('hidden');
            }
        }

        function openCartModal() {
            updateCartDisplay();
            document.getElementById('cartModal').classList.remove('hidden');
        }

        function closeCartModal() {
            document.getElementById('cartModal').classList.add('hidden');
        }

        function updateCartDisplay() {
            const cartItems = document.getElementById('cartItems');
            const subtotalElement = document.getElementById('subtotal');
            const totalElement = document.getElementById('total');
            
            if (cart.length === 0) {
                cartItems.innerHTML = '<p class="text-gray-500 text-center py-8">Your cart is empty</p>';
                subtotalElement.textContent = '₹0';
                totalElement.textContent = '₹0';
                return;
            }
            
            let subtotal = 0;
            cartItems.innerHTML = cart.map(item => {
                const itemTotal = item.price * item.quantity;
                subtotal += itemTotal;
                return `
                    <div class="flex items-center space-x-4 bg-white p-4 rounded-lg border border-gray-200 hover:shadow-md transition-shadow">
                        <img src="${item.image}" alt="${item.name}" class="w-16 h-16 object-cover rounded-lg">
                        <div class="flex-1">
                            <h4 class="font-semibold text-gray-800">${item.name}</h4>
                            <p class="text-gray-600">₹${item.price} × ${item.quantity} = ₹${itemTotal}</p>
                        </div>
                        <div class="flex items-center space-x-2">
                            <button onclick="updateQuantity(${item.id}, -1)" class="w-10 h-10 bg-red-500 text-white rounded-lg hover:bg-red-600 transition-colors font-bold text-lg">-</button>
                            <span class="w-16 text-center font-bold text-lg border-2 border-gray-300 rounded-lg py-1">${item.quantity}</span>
                            <button onclick="updateQuantity(${item.id}, 1)" class="w-10 h-10 bg-green-500 text-white rounded-lg hover:bg-green-600 transition-colors font-bold text-lg">+</button>
                            <button onclick="removeFromCart(${item.id})" class="ml-2 text-red-500 hover:text-red-700 p-2 hover:bg-red-50 rounded-lg transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
            
            const deliveryFee = 20;
            const total = subtotal + deliveryFee;
            
            subtotalElement.textContent = `₹${subtotal}`;
            totalElement.textContent = `₹${total}`;
        }

        function updateQuantity(productId, change) {
            const item = cart.find(item => item.id === productId);
            if (item) {
                item.quantity += change;
                if (item.quantity <= 0) {
                    removeFromCart(productId);
                } else {
                    localStorage.setItem('cart', JSON.stringify(cart));
                    updateCartCount();
                    updateCartDisplay();
                }
            }
        }

        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            updateCartDisplay();
        }

        function placeOrder() {
            if (cart.length === 0) {
                alert('Your cart is empty!');
                return;
            }
            
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!currentUser) {
                alert('Please login to place an order!');
                closeCartModal();
                openLoginModal();
                return;
            }
            
            const deliveryRoom = document.getElementById('deliveryRoom').value;
            const deliveryMobile = document.getElementById('deliveryMobile').value;
            const paymentMethod = document.querySelector('input[name="payment"]:checked').value;
            
            if (!deliveryRoom || !deliveryMobile) {
                alert('Please fill in delivery details!');
                return;
            }
            
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const total = subtotal + 20; // delivery fee
            
            const order = {
                id: Date.now(),
                userId: currentUser.email,
                items: cart,
                deliveryRoom: deliveryRoom,
                deliveryMobile: deliveryMobile,
                paymentMethod: paymentMethod,
                subtotal: subtotal,
                deliveryFee: 20,
                total: total,
                date: new Date().toISOString()
            };
            
            // Store order
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            orders.push(order);
            localStorage.setItem('orders', JSON.stringify(orders));
            
            // Clear cart
            cart = [];
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            
            alert(`Order placed successfully! Total: ₹${total}. Your order will be delivered to Room ${deliveryRoom}.`);
            closeCartModal();
        }

        // Login Modal Functions
        function openLoginModal() {
            document.getElementById('loginModal').classList.remove('hidden');
        }

        function closeLoginModal() {
            document.getElementById('loginModal').classList.add('hidden');
        }

        function showLoginForm() {
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('signupForm').classList.add('hidden');
            document.getElementById('loginTab').classList.add('text-green-600', 'border-b-2', 'border-green-600');
            document.getElementById('loginTab').classList.remove('text-gray-600');
            document.getElementById('signupTab').classList.remove('text-green-600', 'border-b-2', 'border-green-600');
            document.getElementById('signupTab').classList.add('text-gray-600');
        }

        function showSignUpForm() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('signupForm').classList.remove('hidden');
            document.getElementById('signupTab').classList.add('text-green-600', 'border-b-2', 'border-green-600');
            document.getElementById('signupTab').classList.remove('text-gray-600');
            document.getElementById('loginTab').classList.remove('text-green-600', 'border-b-2', 'border-green-600');
            document.getElementById('loginTab').classList.add('text-gray-600');
        }

        function handleLogin(event) {
            event.preventDefault();
            
            const formData = new FormData(event.target);
            const email = formData.get('email');
            const password = formData.get('password');
            
            // Check if user exists in localStorage
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            console.log('Stored users:', users); // Debug log
            console.log('Login attempt:', email, password); // Debug log
            
            const user = users.find(u => u.email === email && u.password === password);
            
            if (user) {
                // Store current user session
                localStorage.setItem('currentUser', JSON.stringify(user));
                console.log('Login successful:', user); // Debug log
                alert(`Welcome back ${user.name}! You have successfully logged in.`);
                closeLoginModal();
                updateLoginButton(user.name);
            } else {
                console.log('Login failed'); // Debug log
                alert('Invalid email or password. Please try again or sign up.');
            }
        }

        function handleSignUp(event) {
            event.preventDefault();
            
            const formData = new FormData(event.target);
            const userData = {
                name: formData.get('name'),
                email: formData.get('email'),
                password: formData.get('password'),
                mobile: formData.get('mobile'),
                room: formData.get('room'),
                category: formData.get('category')
            };
            
            console.log('New user data:', userData); // Debug log
            
            // Get existing users
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            console.log('Existing users before signup:', users); // Debug log
            
            // Check if email already exists
            if (users.find(u => u.email === userData.email)) {
                alert('An account with this email already exists. Please login instead.');
                return;
            }
            
            // Add new user
            users.push(userData);
            localStorage.setItem('users', JSON.stringify(users));
            console.log('Users after signup:', users); // Debug log
            
            // Store current user session
            localStorage.setItem('currentUser', JSON.stringify(userData));
            console.log('Current user set:', userData); // Debug log
            
            alert(`Welcome ${userData.name}! Your ${userData.category} account has been created successfully.`);
            closeLoginModal();
            updateLoginButton(userData.name);
        }

        function updateLoginButton(userName) {
            const loginButton = document.querySelector('button[onclick="openLoginModal()"]');
            if (loginButton) {
                loginButton.innerHTML = `
                    <div class="relative group">
                        <div class="flex items-center space-x-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                            </svg>
                            <span>${userName}</span>
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </div>
                        <div class="absolute top-full right-0 mt-2 w-48 bg-white rounded-md shadow-lg border border-gray-200 z-50 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200">
                            <div class="py-1">
                                <button onclick="openSettingsModal()" class="block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                                    <svg class="w-4 h-4 inline mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c-.94 1.543.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c.94-1.543-.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                    </svg>
                                    Settings
                                </button>
                                <button onclick="logout()" class="block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                                    <svg class="w-4 h-4 inline mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                                    </svg>
                                    Logout
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                loginButton.removeAttribute('onclick');
                loginButton.setAttribute('title', 'Logged in as ' + userName);
            }
        }

        // Settings Modal Functions
        function openSettingsModal() {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (currentUser) {
                // Pre-fill form with current user data
                document.getElementById('settingsName').value = currentUser.name;
                document.getElementById('settingsEmail').value = currentUser.email;
                document.getElementById('settingsMobile').value = currentUser.mobile;
                document.getElementById('settingsRoom').value = currentUser.room;
                document.getElementById('settingsCurrentPassword').value = '';
                document.getElementById('settingsNewPassword').value = '';
                
                document.getElementById('settingsModal').classList.remove('hidden');
            }
        }

        function closeSettingsModal() {
            document.getElementById('settingsModal').classList.add('hidden');
        }

        function handleSettingsUpdate(event) {
            event.preventDefault();
            
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            const formData = new FormData(event.target);
            
            // Verify current password
            if (formData.get('currentPassword') !== currentUser.password) {
                alert('Current password is incorrect. Please try again.');
                return;
            }
            
            // Update user data
            const updatedData = {
                name: formData.get('name'),
                email: formData.get('email'),
                mobile: formData.get('mobile'),
                room: formData.get('room'),
                password: formData.get('newPassword') || currentUser.password,
                category: currentUser.category
            };
            
            // Update in users array
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const userIndex = users.findIndex(u => u.email === currentUser.email);
            if (userIndex !== -1) {
                users[userIndex] = updatedData;
                localStorage.setItem('users', JSON.stringify(users));
            }
            
            // Update current session
            localStorage.setItem('currentUser', JSON.stringify(updatedData));
            
            alert('Settings updated successfully!');
            closeSettingsModal();
            updateLoginButton(updatedData.name);
        }

        function logout() {
            // Clear current user session
            localStorage.removeItem('currentUser');
            alert('You have been logged out successfully.');
            
            // Reset login button
            const loginButton = document.querySelector('button[title^="Logged in as"]');
            if (loginButton) {
                loginButton.innerHTML = `
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                    </svg>
                    <span>Login</span>
                `;
                loginButton.removeAttribute('title');
                loginButton.setAttribute('onclick', 'openLoginModal()');
            }
        }

        // Load products when page loads
        document.addEventListener('DOMContentLoaded', function() {
            loadProducts();
            
            // Initialize cart
            updateCartCount();
            
            // Check if user is already logged in
            const savedUser = localStorage.getItem('currentUser');
            console.log('Checking saved user on page load:', savedUser); // Debug log
            if (savedUser) {
                const userData = JSON.parse(savedUser);
                console.log('User found on page load:', userData); // Debug log
                updateLoginButton(userData.name);
            }
            
            // Log all stored users for debugging
            const allUsers = localStorage.getItem('users');
            console.log('All stored users:', allUsers ? JSON.parse(allUsers) : 'No users found');
        });
    </script>
</body>
</html>
